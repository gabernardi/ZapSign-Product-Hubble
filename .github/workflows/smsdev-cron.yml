name: SMS Dev — saldo no Google Chat

# Roda 2x/dia (09:00 e 21:00 BRT). Plano Hobby da Vercel só permite cron
# diário, então usamos GitHub Actions como agendador externo chamando o
# endpoint /api/cron/smsdev-balance do Hubble.
on:
  schedule:
    # 12:00 UTC = 09:00 BRT (manhã)
    - cron: "0 12 * * *"
    # 00:00 UTC = 21:00 BRT (fim do dia)
    - cron: "0 0 * * *"
  # Permite disparo manual via aba "Actions" no GitHub
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Valida secrets
        env:
          HUBBLE_BASE_URL: ${{ secrets.HUBBLE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          missing=0
          if [ -z "${HUBBLE_BASE_URL:-}" ]; then
            echo "::error::Secret HUBBLE_BASE_URL não configurado no repo (Settings → Secrets → Actions)."
            missing=1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Secret CRON_SECRET não configurado no repo (Settings → Secrets → Actions)."
            missing=1
          fi
          [ "$missing" -eq 0 ] || exit 1

          # Diagnóstico: confirma o formato da URL sem vazar o valor.
          # Apenas printa características — o GitHub mascara o valor real
          # de qualquer forma se foi configurado como secret.
          url_len=${#HUBBLE_BASE_URL}
          starts_https=$(printf '%s' "$HUBBLE_BASE_URL" | grep -c '^https://' || true)
          has_trailing_slash=$(printf '%s' "$HUBBLE_BASE_URL" | grep -c '/$' || true)
          has_whitespace=$(printf '%s' "$HUBBLE_BASE_URL" | grep -cE '[[:space:]]' || true)
          echo "HUBBLE_BASE_URL · length=${url_len} starts_https=${starts_https} trailing_slash=${has_trailing_slash} whitespace=${has_whitespace}"
          if [ "$starts_https" -eq 0 ]; then
            echo "::warning::HUBBLE_BASE_URL não começa com https://. Adicione o esquema completo (ex: https://hubble.zapsign.com.br)."
          fi
          if [ "$has_whitespace" -gt 0 ]; then
            echo "::error::HUBBLE_BASE_URL contém espaços/quebras de linha. Reconfigure o secret."
            exit 1
          fi

      - name: Checa saldo SMS Dev e posta no Google Chat
        env:
          HUBBLE_BASE_URL: ${{ secrets.HUBBLE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail

          base="${HUBBLE_BASE_URL%/}"
          url="${base}/api/cron/smsdev-balance"
          echo "POST ${url}"

          # -s silencioso, -S mostra erro, -o salva body, -w só imprime status.
          # Sem -f para não falhar imediatamente em 4xx/5xx — queremos ver o body.
          curl_exit=0
          http_code=$(
            curl -sS \
              -o /tmp/response.body \
              -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "content-type: application/json" \
              --max-time 30 \
              "${url}"
          ) || curl_exit=$?

          echo "curl_exit=${curl_exit}"
          echo "http_code=${http_code:-<none>}"
          echo "--- response body ---"
          cat /tmp/response.body 2>/dev/null || echo "(empty)"
          echo
          echo "--- summary ---"

          if [ "$curl_exit" -ne 0 ]; then
            echo "::error::curl falhou com exit ${curl_exit}. Veja https://everything.curl.dev/usingcurl/returns para o significado."
            exit 1
          fi

          if [ -z "${http_code:-}" ] || [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::HTTP ${http_code} — resposta não OK. Veja o body acima."
            exit 1
          fi

          if jq -e . /tmp/response.body > /dev/null 2>&1; then
            jq -r '
              if .ok then
                "OK · saldo=" + (.result.saldo|tostring) + " threshold=" + (.result.threshold|tostring) + " status=" + .result.status
              else
                "FAIL · " + (.error // (.result.descricao // "erro desconhecido"))
              end
            ' /tmp/response.body
          else
            echo "::warning::Resposta não é JSON válido (HTTP ${http_code} mas body inesperado)."
            exit 1
          fi
